<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaastu Guru Dr. Gaurav Sri Aggarwal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #d4af37;
            --deep-overlay: rgba(10, 20, 40, 0.9); 
            --glass: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            background-color: #000;
        }

        /* Fixed Background Image */
        .page-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('http://googleusercontent.com/image_generation_content/0'); 
            background-size: cover;
            background-position: center 20%;
            z-index: -2;
        }

        .page-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        .card-container {
            width: 100%;
            max-width: 400px;
            background: var(--deep-overlay);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 40px;
            text-align: center;
            padding-bottom: 30px;
            margin: 20px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .header-spacer {
            height: 100px;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.15), transparent);
            border-radius: 40px 40px 0 0;
        }

        .logo-area {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 50%;
            margin: -60px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid var(--primary-gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            position: relative;
            z-index: 5;
        }

        .logo-area img { width: 85%; height: auto; }

        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: 1.4rem; 
            margin: 20px 15px 5px; 
            color: var(--primary-gold);
        }

        .subtitle { 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            margin-bottom: 25px;
            color: #ccc;
        }

        .btn-save {
            display: inline-block;
            background: var(--primary-gold);
            color: #000;
            padding: 14px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-bottom: 25px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 20px;
        }

        .link-item {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 5px;
            border-radius: 18px;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .link-item:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--primary-gold);
        }

        .link-item i { font-size: 1.6rem; margin-bottom: 8px; color: var(--primary-gold); }
        .link-item span { font-size: 0.8rem; }

        /* Specific Brand Colors */
        .fa-youtube { color: #ff0000 !important; }
        .fa-instagram { color: #e1306c !important; }
        .fa-facebook { color: #1877f2 !important; }
        .fa-location-dot { color: #4285F4 !important; }
        .fa-google-drive { color: #34a853 !important; }

        footer { font-size: 0.65rem; opacity: 0.4; margin-top: 25px; }

        .toast {
            position: fixed;
            bottom: 30px;
            background: var(--primary-gold);
            color: #000;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="page-background"></div>
    <div class="page-overlay"></div>

    <div class="card-container" id="mainCard">
        <div class="header-spacer"></div>
        <div class="logo-area">
            <img src="https://www.vaastumahajeevan.com/wp-content/uploads/2021/05/cropped-Vastu-Mahajeevan-Logo-1-1.png" alt="Logo">
        </div>
        
        <h1>Dr. Gaurav Sri Aggarwal</h1>
        <p class="subtitle">Vaastu Guru & Numerologist</p>

        <a href="javascript:void(0)" onclick="handleSaveContact()" class="btn-save">
            <i class="fa-solid fa-user-plus"></i> &nbsp;Save Contact
        </a>

        <div class="links-grid">
            <a href="https://gauravsriaggarwal.com" class="link-item" target="_blank">
                <i class="fa-solid fa-globe"></i><span>Website</span>
            </a>
            <a href="https://www.instagram.com/vaastumahajeevan?igsh=Zng5eWYzdzBidHZm" class="link-item" target="_blank">
                <i class="fa-brands fa-instagram"></i><span>Instagram</span>
            </a>
            <a href="https://www.facebook.com/vaastumahajeevan" class="link-item" target="_blank">
                <i class="fa-brands fa-facebook"></i><span>Facebook</span>
            </a>
            <a href="https://twitter.com/vaastumahajeeva" class="link-item" target="_blank">
                <i class="fa-brands fa-x-twitter"></i><span>Twitter</span>
            </a>
            <a href="https://www.youtube.com/@VaastuMahajeevan" class="link-item" target="_blank">
                <i class="fa-brands fa-youtube"></i><span>YouTube</span>
            </a>
            <a href="INSERT_DRIVE_URL_HERE" class="link-item" target="_blank">
                <i class="fa-brands fa-google-drive"></i><span>Google Drive</span>
            </a>
            <a href="https://www.google.com/maps/search/?api=1&query=Vaastu+MahaJeevan+B13+Swasthya+Vihar+Delhi" class="link-item" target="_blank">
                <i class="fa-solid fa-location-dot"></i><span>Location</span>
            </a>
            <a href="mailto:vaastumahajeevan@gmail.com" class="link-item" onclick="handleEmail(event)">
                <i class="fa-solid fa-envelope"></i><span>Email Us</span>
            </a>
            <a href="tel:+919212607636" class="link-item" onclick="handleCall(event)">
                <i class="fa-solid fa-phone" style="color: #25d366 !important;"></i><span>Call Now</span>
            </a>
        </div>

        <footer>© 2026 Vaastu Mahajeevan</footer>
    </div>

    <div id="toast" class="toast">Number Copied!</div>

    <script>
        window.onload = () => {
            const card = document.getElementById('mainCard');
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        function handleCall(e) {
            const number = "+919212607636";
            navigator.clipboard.writeText(number).then(() => {
                showToast("Number Copied");
            });
        }

        function handleEmail(e) {
            const email = "vaastumahajeevan@gmail.com";
            navigator.clipboard.writeText(email).then(() => {
                showToast("Email Copied");
            });
        }

        function handleSaveContact() {
            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Vaastu Guru Dr. Gaurav Sri Aggarwal\nORG:Vaastu Mahajeevan\nTEL;TYPE=CELL:+919212607636\nADR;TYPE=WORK:;;B 13;Delhi;Delhi;110092;India\nEMAIL:vaastumahajeevan@gmail.com\nURL:https://gauravsriaggarwal.com\nEND:VCARD";
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = "Dr_Gaurav_Sri_Aggarwal.vcf";
            link.click();
        }
    </script>
</body>
</html>
