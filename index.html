<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vaastu Guru Dr. Gaurav Sri Aggarwal</title>

    

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    

    <style>

        :root {

            --champagne-gold: #e5d1a0;

            --crimson-maroon: #5a0b0d;

            --deep-overlay: rgba(45, 4, 5, 0.92); 

            --glass: rgba(255, 255, 255, 0.08);

            --text-light: #f4e8d1;

        }



        * { box-sizing: border-box; }



        body {

            margin: 0;

            padding: 0;

            font-family: 'Poppins', sans-serif;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            color: var(--text-light);

            overflow-x: hidden;

            background-color: #1a0203;

        }



        /* Portrait Background */

        .page-background {

            position: fixed;

            top: 0; left: 0; width: 100%; height: 100%;

            background-image: url('http://googleusercontent.com/image_generation_content/0'); 

            background-size: cover;

            background-position: center 20%;

            z-index: -2;

        }



        /* Red-tined Vignette to match the provided contrast */

        .page-overlay {

            position: fixed;

            top: 0; left: 0; width: 100%; height: 100%;

            background: radial-gradient(circle, rgba(90, 11, 13, 0.2) 0%, rgba(26, 2, 3, 0.95) 100%);

            z-index: -1;

        }



        .card-container {

            width: 100%;

            max-width: 400px;

            background: var(--deep-overlay);

            backdrop-filter: blur(12px);

            -webkit-backdrop-filter: blur(12px);

            border: 1px solid var(--champagne-gold);

            border-radius: 40px;

            text-align: center;

            padding-bottom: 35px;

            margin: 20px;

            box-shadow: 0 40px 80px rgba(0,0,0,0.9);

            opacity: 0;

            transform: translateY(30px);

            transition: all 0.8s ease-out;

        }



        .header-accent {

            height: 110px;

            background: linear-gradient(180deg, rgba(229, 209, 160, 0.15), transparent);

            border-radius: 40px 40px 0 0;

        }



        /* New Logo Area with "Since 1997" Image */

        .logo-area {

            width: 130px;

            height: 130px;

            background: #fff;

            border-radius: 50%;

            margin: -65px auto 0;

            display: flex;

            align-items: center;

            justify-content: center;

            border: 4px solid var(--champagne-gold);

            box-shadow: 0 15px 30px rgba(0,0,0,0.6);

            position: relative;

            z-index: 5;

            overflow: hidden;

        }



        .logo-area img { 

            width: 100%; 

            height: 100%; 

            object-fit: cover; 

        }



        h1 { 

            font-family: 'Cinzel', serif; 

            font-size: 1.45rem; 

            margin: 25px 15px 5px; 

            color: var(--champagne-gold);

            text-shadow: 0 2px 10px rgba(0,0,0,0.5);

        }



        .subtitle { 

            font-size: 0.8rem; 

            letter-spacing: 2px; 

            text-transform: uppercase; 

            margin-bottom: 25px;

            color: #d1b48c;

            font-weight: 300;

        }



        /* Save Contact - Champagne Gold Style */

        .btn-save {

            display: inline-block;

            background: var(--champagne-gold);

            color: #2d0405;

            padding: 15px 50px;

            border-radius: 50px;

            text-decoration: none;

            font-weight: 700;

            text-transform: uppercase;

            letter-spacing: 1px;

            transition: all 0.3s;

            margin-bottom: 25px;

            box-shadow: 0 8px 20px rgba(229, 209, 160, 0.2);

        }



        .btn-save:hover {

            background: #fff;

            transform: scale(1.05);

        }



        .links-grid {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 15px;

            padding: 0 25px;

        }



        .link-item {

            background: var(--glass);

            border: 1px solid rgba(229, 209, 160, 0.15);

            padding: 20px 10px;

            border-radius: 20px;

            text-decoration: none;

            color: #fff;

            display: flex;

            flex-direction: column;

            align-items: center;

            transition: all 0.3s ease;

        }



        .link-item:hover {

            background: rgba(229, 209, 160, 0.1);

            border-color: var(--champagne-gold);

            transform: translateY(-5px);

        }



        .link-item i { font-size: 1.8rem; margin-bottom: 10px; color: var(--champagne-gold); }

        .link-item span { font-size: 0.85rem; font-weight: 400; }



        /* Icon Brands Colors */

        .fa-youtube { color: #ff0000 !important; }

        .fa-instagram { color: #e1306c !important; }

        .fa-google-drive { color: #34a853 !important; }



        footer { font-size: 0.7rem; opacity: 0.5; margin-top: 30px; letter-spacing: 1px; color: var(--champagne-gold); }



        .toast {

            position: fixed;

            bottom: 30px;

            background: var(--champagne-gold);

            color: #2d0405;

            padding: 12px 30px;

            border-radius: 30px;

            font-weight: bold;

            display: none;

            z-index: 1000;

        }

    </style>

</head>

<body>



    <div class="page-background"></div>

    <div class="page-overlay"></div>



    <div class="card-container" id="mainCard">

        <div class="header-accent"></div>

        

        <div class="logo-area">

            <img src="logo.png" alt="Vaastu Logo">

        </div>

        

        <h1>Dr. Gaurav Sri Aggarwal</h1>

        <p class="subtitle">Vaastu Guru & Numerologist</p>



        <a href="javascript:void(0)" onclick="handleSaveContact()" class="btn-save">

            <i class="fa-solid fa-user-plus"></i> &nbsp;Save Contact

        </a>



        <div class="links-grid">

            <a href="https://gauravsriaggarwal.com" class="link-item" target="_blank">

                <i class="fa-solid fa-globe"></i><span>Website</span>

            </a>

            <a href="https://www.instagram.com/vaastumahajeevan?igsh=Zng5eWYzdzBidHZm" class="link-item" target="_blank">

                <i class="fa-brands fa-instagram"></i><span>Instagram</span>

            </a>

            <a href="https://www.facebook.com/vaastumahajeevan" class="link-item" target="_blank">

                <i class="fa-brands fa-facebook"></i><span>Facebook</span>

            </a>

            <a href="https://twitter.com/vaastumahajeeva" class="link-item" target="_blank">

                <i class="fa-brands fa-x-twitter"></i><span>Twitter</span>

            </a>

            <a href="https://www.youtube.com/@VaastuMahajeevan" class="link-item" target="_blank">

                <i class="fa-brands fa-youtube"></i><span>YouTube</span>

            </a>

            <a href="https://drive.google.com/drive/folders/1-BTfVWrc2YpeRjamzBlfkV5q8l7g1psk?usp=share_link" class="link-item" target="_blank">

                <i class="fa-brands fa-google-drive"></i><span>Google Drive</span>

            </a>

            <a href="http://googleusercontent.com/maps.google.com/final" class="link-item" target="_blank">

                <i class="fa-solid fa-location-dot" style="color: #4285F4 !important;"></i><span>Location</span>

            </a>

            <a href="mailto:vaastumahajeevan@gmail.com" class="link-item" onclick="handleEmail(event)">

                <i class="fa-solid fa-envelope"></i><span>Email Us</span>

            </a>

            <a href="tel:+919212607636" class="link-item" onclick="handleCall(event)">

                <i class="fa-solid fa-phone" style="color: #25d366 !important;"></i><span>Call Now</span>

            </a>

        </div>



        <footer>© 2026 Vaastu Mahajeevan</footer>

    </div>



    <div id="toast" class="toast">Copied!</div>



    <script>

        window.onload = () => {

            const card = document.getElementById('mainCard');

            card.style.opacity = '1';

            card.style.transform = 'translateY(0)';

        };



        function showToast(msg) {

            const toast = document.getElementById('toast');

            toast.innerText = msg;

            toast.style.display = 'block';

            setTimeout(() => { toast.style.display = 'none'; }, 2000);

        }



        function handleCall(e) {

            const number = "+919212607636";

            navigator.clipboard.writeText(number).then(() => {

                showToast("Number Copied");

            });

        }



        function handleEmail(e) {

            const email = "vaastumahajeevan@gmail.com";

            navigator.clipboard.writeText(email).then(() => {

                showToast("Email Copied");

            });

        }



        function handleSaveContact() {

            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Vaastu Guru Dr. Gaurav Sri Aggarwal\nORG:Vaastu Mahajeevan\nTEL;TYPE=CELL:+919212607636\nADR;TYPE=WORK:;;B 13;Delhi;Delhi;110092;India\nEMAIL:vaastumahajeevan@gmail.com\nURL:https://gauravsriaggarwal.com\nEND:VCARD";

            const blob = new Blob([vcard], { type: "text/vcard" });

            const url = window.URL.createObjectURL(blob);

            const link = document.createElement('a');

            link.href = url;

            link.download = "Dr_Gaurav_Sri_Aggarwal.vcf";

            link.click();

        }

    </script>

</body>

</html>
